site_name: Schedula Solver API
site_description: Complete API documentation for the Schedula schedule solver
site_author: Schedula Team
site_url: https://your-org.github.io/schedula-fastapi/

theme:
  name: material
  palette:
    - scheme: light
      primary: blue
      accent: blue
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
    - scheme: dark
      primary: blue
      accent: blue
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.select

markdown_extensions:
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      toc_depth: 2

plugins:
  - search
  - awesome-pages

nav:
  - Home: index.md
  - Setup: setup.md
  - Integration: integration.md
  - API Reference: api.md
  - Constraints: constraints.md
  - Deployment: deployment.md
  - Testing: testing.md
  - Troubleshooting: troubleshooting.md

extra:
  version: 0.1.0
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-org/schedula-fastapi
