site_name: Schedula Solver API
site_description: Campus-wide course scheduling solver for higher education
site_author: Schedula Team
site_url: https://a-elhaag.github.io/schedula-fastapi/
docs_dir: .
site_dir: ../site

theme:
  name: material
  logo: https://api.schedula.dev/logo.png
  favicon: https://api.schedula.dev/favicon.ico
  palette:
    - scheme: light
      primary: blue
      accent: lightblue
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
    - scheme: dark
      primary: blue
      accent: lightblue
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.select
    - toc.follow

markdown_extensions:
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - toc:
      toc_depth: 3

plugins:
  - search
  - minify

nav:
  - Documentation: index.md

extra:
  version: 0.1.0
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/a-elhaag/schedula-fastapi
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com
